name: Deploy iOS Demo to TestFlight

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy-testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Project Dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi

      - name: Generate Expo iOS Project (if Expo app)
        run: |
          if [ -f "app.json" ] && [ ! -d "ios" ]; then
            npx expo prebuild --platform ios --no-install
          fi

      - name: Setup Web Directory & Capacitor Sync (if Capacitor app)
        run: |
          if [ -f "capacitor.config.json" ]; then
            mkdir -p out
            npm run build || true
            npx cap sync ios
          fi

      - name: Setup CocoaPods
        run: |
          if [ -d "ios/App" ]; then
            cd ios/App && pod install
          elif [ -d "ios" ]; then
            cd ios && pod install
          fi

      - name: Install Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Decode and import certificate
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Decode and install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build Archive & Export IPA
        run: |
          # Detect workspace/project path
          if [ -d "ios/App" ]; then
            cd ios/App
            agvtool next-version -all || true
            xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive archive
            xcodebuild -exportArchive -archivePath build/App.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build
          elif [ -d "ios" ]; then
            cd ios
            agvtool next-version -all || true
            # Get project name from folder
            projName=$(ls | grep .xcodeproj | head -n 1 | cut -f 1 -d '.')
            xcodebuild -workspace "$projName.xcworkspace" -scheme "$projName" -configuration Release -archivePath build/$projName.xcarchive archive
            xcodebuild -exportArchive -archivePath build/$projName.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build
          fi

      - name: Upload Signed IPA to App Store Connect TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          # Find generated IPA path
          ipaPath=$(find . -name "*.ipa" -print -quit)
          if [ -n "$ipaPath" ]; then
            echo "Found IPA at: $ipaPath"
            
            # Write App Store Connect API Key p8 content
            mkdir -p ~/.appstoreconnect/private_keys
            echo "$ASC_API_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_$ASC_API_KEY_ID.p8
            
            # Upload using xcrun
            xcrun altool --upload-app                         --type ios                         --file "$ipaPath"                         --apiKey "$ASC_API_KEY_ID"                         --apiIssuer "$ASC_API_ISSUER_ID"
            echo "Successfully uploaded build to TestFlight!"
          else
            echo "Error: No IPA container found."
            exit 1
          fi
